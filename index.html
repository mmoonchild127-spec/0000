<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Opik!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: #fff5f5;
            font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; color: #4a4a4a;
        }

        /* Dekorasi Love Melayang */
        .floating-heart {
            position: fixed; font-size: 20px; color: #ffb3c1; opacity: 0.6;
            animation: moveHeart 6s infinite ease-in-out; pointer-events: none; z-index: 1;
        }
        @keyframes moveHeart {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Container Utama */
        #quiz-container, .container {
            text-align: center; z-index: 10; width: 90%; max-width: 500px;
        }

        /* Font Estetik untuk Judul/Pesan Utama */
        h1, h2, .estetik-font {
            font-family: 'Dancing Script', cursive;
            color: #ff85a2;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        h1 { font-size: 2.8rem; margin-bottom: 20px; }
        h2 { font-size: 2.2rem; margin: 10px 0; }
        p { line-height: 1.8; font-size: 1.2rem; font-weight: 500; }

        /* Tombol Sejajar & Rapih */
        .btn-group {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; /* Jarak antar tombol agar tidak numpuk */
            min-height: 60px;
            position: relative;
        }

            cursor: pointer; font-weight: bold; font-family: 'Quicksand', sans-serif;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
